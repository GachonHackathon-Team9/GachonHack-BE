spring:
  application:
    name: GachonHack

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "${KAKAO_REDIRECT_URI}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  token:
    secretKey: ${JWT_SECRET_KEY}
    expiration:
      access: 3600000      # 1시간
      refresh: 1209600000  # 14일

oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173}

quest:
  daily:
    zone: Asia/Seoul
    active-count: 3
    refresh-cron: "0 0 0 * * *"

app:
  websocket:
    # 쉼표 구분. 운영: WEBSOCKET_ALLOWED_ORIGINS=https://your-frontend.com
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000}
