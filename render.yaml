services:
  # 1. MySQL 데이터베이스 서비스 설정
  - type: web
    name: mysql-db
    runtime: docker
    repo: https://github.com/render-examples/mysql # Render 공식 MySQL 템플릿 이용
    plan: free
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        sync: false # Render 대시보드 값
      - key: MYSQL_DATABASE
        value: hackathon_db
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1

  # 2. Spring Boot 백엔드 서비스 설정
  - type: web
    name: spring-backend
    runtime: docker
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        # 내부 네트워크를 통해 mysql-db 서비스로 직접 연결
        value: jdbc:mysql://mysql-db:3306/hackathon_db?allowPublicKeyRetrieval=true&useSSL=false
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false # Render 대시보드 값